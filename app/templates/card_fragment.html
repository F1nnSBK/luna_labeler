<div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 shadow-2xl flex flex-col md:flex-row gap-6 items-stretch">
    <!-- Left panel: Info & Controls -->
    <div class="flex-1 flex flex-col justify-between space-y-6 min-w-[280px]">
        <!-- Top part of left panel -->
        <div class="space-y-6">
            <!-- Metrics and Counters -->
            <div class="flex justify-between items-center text-xs font-mono text-zinc-500">
                <span>ID: <span class="text-zinc-400">{{ payload.component_id }}</span></span>
                <span class="bg-zinc-800 px-2 py-1 rounded text-emerald-400">Steps: {{ steps }}</span>
            </div>

            <!-- Dynamic Gen-Z Heuristic Notification Box -->
            <div class="bg-zinc-950/60 border border-zinc-800/80 rounded-xl p-4 text-center">
                <p class="text-xs font-mono uppercase tracking-widest text-zinc-500 mb-1">Heuristic Output String</p>
                <p class="text-sm font-medium tracking-wide text-zinc-200">"{{ payload.telemetry_string }}"</p>
            </div>

            <!-- Mode Status Indicators -->
            <div class="space-y-2">
                <p class="text-[10px] font-mono uppercase tracking-widest text-zinc-500">Active Tool (1-3)</p>
                <div class="grid grid-cols-1 gap-2">
                    <div id="mode-pit" class="px-3 py-2 text-xs font-mono rounded bg-emerald-900/50 text-emerald-500 border border-emerald-500 flex justify-between items-center">
                        <span>PIT</span>
                        <kbd class="bg-emerald-950/40 px-2 py-0.5 rounded text-[10px] text-emerald-300">1</kbd>
                    </div>
                    <div id="mode-stone" class="px-3 py-2 text-xs font-mono rounded bg-zinc-900 text-zinc-500 border border-transparent flex justify-between items-center">
                        <span>STONE</span>
                        <kbd class="bg-zinc-950/40 px-2 py-0.5 rounded text-[10px] text-zinc-500">2</kbd>
                    </div>
                    <div id="mode-crater" class="px-3 py-2 text-xs font-mono rounded bg-zinc-900 text-zinc-500 border border-transparent flex justify-between items-center">
                        <span>CRATER</span>
                        <kbd class="bg-zinc-950/40 px-2 py-0.5 rounded text-[10px] text-zinc-500">3</kbd>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom part of left panel -->
        <div class="space-y-4">
            <!-- Submit Button (Enter) -->
            <button id="btn-submit" 
                    hx-post="/dashboard/submit/{{ payload.component_id }}?execution_steps={{ steps }}"
                    hx-include="#spatial-vector-data"
                    hx-target="#calibration-workspace"
                    hx-swap="innerHTML"
                    class="w-full py-3 bg-zinc-100 text-zinc-900 hover:bg-zinc-200 active:bg-zinc-300 rounded-xl font-bold transition-colors text-sm flex justify-between items-center px-6">
                <span>Save & Next</span>
                <kbd class="bg-zinc-300/60 px-2 py-0.5 rounded text-[10px] text-zinc-800">Enter</kbd>
            </button>

            <!-- Guide / Legend -->
            <div class="border border-zinc-800 rounded-xl p-3 bg-zinc-950/40 space-y-1.5 text-[11px] font-mono text-zinc-400">
                <div class="flex justify-between"><span>[Space]</span> <span class="text-zinc-500">Freeze Polygon</span></div>
                <div class="flex justify-between"><span>[Z]</span> <span class="text-zinc-500">Undo Node</span></div>
                <div class="flex justify-between"><span>[ESC]</span> <span class="text-zinc-500">Clear Active</span></div>
                <div class="flex justify-between"><span>[Backspace]</span> <span class="text-zinc-500">Revert Last Image</span></div>
            </div>
        </div>
    </div>

    <!-- Right panel: Image Window -->
    <div class="flex-2 relative aspect-square w-full md:w-[512px] md:h-[512px] rounded-xl overflow-hidden border border-zinc-800 bg-zinc-950 flex items-center justify-center shrink-0">
        <img src="{{ payload.image_routing_url }}" id="target-image" alt="Lunar Anomaly Target"
            class="w-full h-full object-cover select-none pointer-events-none" />
        
        <canvas id="polygon-canvas" class="absolute top-0 left-0 w-full h-full cursor-crosshair"></canvas>
        
        <input type="hidden" id="spatial-vector-data" name="spatial_vector_data" value="[]">

        <!-- Subtle Camouflage Tag -->
        <span
            class="absolute bottom-3 right-3 text-[10px] font-mono bg-black/60 px-2 py-0.5 rounded text-zinc-400 backdrop-blur-sm z-10 pointer-events-none">
            {{ payload.eval_tier }}
        </span>
    </div>

    <!-- Hidden undo button -->
    <button id="btn-undo" 
            hx-post="/dashboard/undo?execution_steps={{ steps }}"
            hx-target="#calibration-workspace"
            hx-swap="innerHTML"
            class="hidden">
    </button>
</div>

<script>
    (function() {
        const canvas = document.getElementById('polygon-canvas');
        const ctx = canvas.getContext('2d');
        const hiddenInput = document.getElementById('spatial-vector-data');
        
        const COLORS = {
            'PIT': { stroke: '#10b981', fill: 'rgba(16, 185, 129, 0.2)' },
            'STONE': { stroke: '#f59e0b', fill: 'rgba(245, 158, 11, 0.2)' },
            'CRATER': { stroke: '#ec4899', fill: 'rgba(236, 72, 153, 0.2)' }
        };

        let activeClass = 'PIT';
        let completedPolygons = []; 
        let currentPolygon = [];    

        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;

        function updateUI() {
            ['pit', 'stone', 'crater'].forEach(c => {
                const el = document.getElementById(`mode-${c}`);
                if (c.toUpperCase() === activeClass) {
                    el.className = `px-2 py-1 text-xs font-mono rounded border ${
                        activeClass === 'PIT' ? 'bg-emerald-900/50 text-emerald-500 border-emerald-500' :
                        activeClass === 'STONE' ? 'bg-amber-900/50 text-amber-500 border-amber-500' :
                        'bg-pink-900/50 text-pink-500 border-pink-500'
                    }`;
                } else {
                    el.className = 'px-2 py-1 text-xs font-mono rounded bg-zinc-900 text-zinc-600 border border-transparent';
                }
            });
        }

        function updatePayload() {
            const payload = [...completedPolygons];
            if (currentPolygon.length > 0) {
                payload.push({ class: activeClass, points: currentPolygon });
            }
            hiddenInput.value = JSON.stringify(payload);
        }

        function drawShape(points, cls, isDashed = false) {
            ctx.beginPath();
            ctx.strokeStyle = COLORS[cls].stroke;
            ctx.fillStyle = COLORS[cls].fill;
            ctx.lineWidth = 2;
            ctx.setLineDash(isDashed ? [5, 5] : []);

            const scaleX = canvas.width / 256;
            const scaleY = canvas.height / 256;

            points.forEach((p, index) => {
                const cx = p[0] * scaleX;
                const cy = p[1] * scaleY;
                if (index === 0) ctx.moveTo(cx, cy);
                else ctx.lineTo(cx, cy);
                ctx.fillRect(cx - 3, cy - 3, 6, 6);
            });

            if (points.length > 2) {
                ctx.closePath();
                ctx.fill();
            }
            ctx.stroke();
        }

        function drawAll() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            completedPolygons.forEach(poly => drawShape(poly.points, poly.class));
            if (currentPolygon.length > 0) {
                drawShape(currentPolygon, activeClass, true);
            }
        }

        canvas.addEventListener('mousedown', function(e) {
            const rect = canvas.getBoundingClientRect();
            const x = Math.round((e.clientX - rect.left) * (256 / rect.width));
            const y = Math.round((e.clientY - rect.top) * (256 / rect.height));
            
            currentPolygon.push([x, y]);
            updatePayload();
            drawAll();
        });

        if (window._lunaKeyHandler) {
            document.removeEventListener('keydown', window._lunaKeyHandler);
        }

        window._lunaKeyHandler = function(e) {
            if (e.key === '1') { activeClass = 'PIT'; updateUI(); drawAll(); }
            if (e.key === '2') { activeClass = 'STONE'; updateUI(); drawAll(); }
            if (e.key === '3') { activeClass = 'CRATER'; updateUI(); drawAll(); }
            
            if (e.key === 'z' || e.key === 'Z') {
                currentPolygon.pop();
                updatePayload();
                drawAll();
            } 
            else if (e.key === 'Escape') {
                currentPolygon = [];
                updatePayload();
                drawAll();
            } 
            else if (e.key === ' ') {
                e.preventDefault();
                if (currentPolygon.length > 2) {
                    completedPolygons.push({ class: activeClass, points: [...currentPolygon] });
                    currentPolygon = [];
                    updatePayload();
                    drawAll();
                }
            }
            else if (e.key === 'Enter') {
                e.preventDefault();
                if (currentPolygon.length > 2) {
                    completedPolygons.push({ class: activeClass, points: [...currentPolygon] });
                    updatePayload();
                }
                htmx.trigger('#btn-submit', 'click');
            }
            else if (e.key === 'Backspace') {
                e.preventDefault();
                htmx.trigger('#btn-undo', 'click');
            }
        };

        document.addEventListener('keydown', window._lunaKeyHandler);
    })();
</script>
